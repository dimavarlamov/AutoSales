    <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление пользователями</title>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="admin-page">
    <h1>Пользователи</h1>
    <a href="/admin/dashboard" class="top-left-button">Назад</a>
    <table class="styled-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Имя</th>
            <th>Фамилия</th>
            <th>Роль</th>
            <th>Статус</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.firstName}"></td>
            <td th:text="${user.lastName}"></td>
            <td th:text="${user.roleId == 1 ? 'Покупатель' : (user.roleId == 2 ? 'Админ' : 'Неизвестно')}"></td>
            <td th:text="${user.enabled ? 'Активен' : 'Заблокирован'}"></td>
            <td>
                <a th:href="@{/admin/users/{id}(id=${user.id})}">Просмотр</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
