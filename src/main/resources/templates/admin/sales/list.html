<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Продажи</title>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="admin-page">
    <h1>Продажи</h1>
    <a href="/admin/dashboard" class="top-left-button">Назад</a>
    <table class="manage-table">
        <thead>
        <tr><th>ID</th><th>Пользователь</th><th>Дата</th><th>Сумма</th><th>Действия</th></tr>
        </thead>
        <tbody>
        <tr th:each="sale : ${sales}">
            <td th:text="${sale.id}"></td>
            <td th:text="${sale.userId}"></td>
            <td th:text="${sale.saleDate}"></td>
            <td th:text="${sale.totalAmount}"></td>
            <td th:text="${sale.status}"></td>
            <td th:text="${sale.paymentType}"></td>
            <td><a th:href="@{/admin/sales/{id}(id=${sale.id})}">Детали</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
