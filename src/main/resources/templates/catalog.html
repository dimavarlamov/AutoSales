<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSales - Каталог автомобилей</title>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <!-- Font Awesome: можно вынести в общий layout, если он есть -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
</head>
<body>
<header class="header">
    <nav class="nav">
        <a href="/catalog" class="logo">
            <img th:src="@{/images/logoAutoSales.jpg}" alt="AutoSales" class="logo-img"/>
        </a>
        <div class="nav-search">
            <form th:action="@{/catalog}" method="get" class="search-form">
                <input type="text" name="search" th:value="${searchQuery}" placeholder="Поиск по марке или модели..." class="search-input"/>
                <button type="submit" class="search-button">Найти</button>
            </form>
            <div class="filter-container">
                <button class="filter-button" type="button">Фильтры</button>
                <form th:action="@{/catalog}" method="get" class="filter-form" id="filter-form">
                    <!-- Бренд -->
                    <label for="brandId">Марка:</label>
                    <select name="brandId" id="brandId">
                        <option value="">Все марки</option>
                        <option th:each="brand : ${brands}"
                                th:value="${brand.id}"
                                th:text="${brand.name}"
                                th:selected="${param.brandId != null and param.brandId[0] == brand.id}"></option>
                    </select>

                    <!-- Модель -->
                    <label for="modelId">Модель:</label>
                    <select name="modelId" id="modelId">
                        <option value="">Все модели</option>
                        <option th:each="m : ${models}"
                                th:value="${m.id}"
                                th:text="${m.brandName + ' ' + m.name}"
                                th:selected="${param.modelId != null and param.modelId[0] == m.id}"></option>
                    </select>

                    <!-- Страна производителя -->
                    <label for="country">Страна производителя:</label>
                    <select name="country" id="country">
                        <option value="">Все страны</option>
                        <option th:each="c : ${countries}"
                                th:value="${c}"
                                th:text="${c}"
                                th:selected="${param.country != null and param.country[0] == c}"></option>
                    </select>

                    <!-- Руль -->
                    <label for="steeringSide">Руль:</label>
                    <select name="steeringSide" id="steeringSide">
                        <option value="">Любой</option>
                        <option value="LEFT" th:selected="${param.steeringSide != null and param.steeringSide[0] == 'LEFT'}">Левый</option>
                        <option value="RIGHT" th:selected="${param.steeringSide != null and param.steeringSide[0] == 'RIGHT'}">Правый</option>
                    </select>

                    <!-- Тип двигателя -->
                    <label for="engineType">Тип двигателя:</label>
                    <select name="engineType" id="engineType">
                        <option value="">Любой</option>
                        <option th:each="opt : ${engineTypeOptions}"
                                th:value="${opt.code}"
                                th:text="${opt.name}"
                                th:selected="${param.engineType != null and param.engineType[0] == opt.code}"></option>
                    </select>

                    <!-- Цена -->
                    <label for="minPrice">Мин. цена:</label>
                    <input type="number" name="minPrice" id="minPrice" min="0" th:value="${param.minPrice}"/>
                    <label for="maxPrice">Макс. цена:</label>
                    <input type="number" name="maxPrice" id="maxPrice" min="0" th:value="${param.maxPrice}"/>

                    <!-- Год выпуска -->
                    <label for="yearFrom">Год выпуска от:</label>
                    <input type="number" name="yearFrom" id="yearFrom" min="1900" th:value="${param.yearFrom}"/>
                    <label for="yearTo">Год выпуска до:</label>
                    <input type="number" name="yearTo" id="yearTo" min="1900" th:value="${param.yearTo}"/>

                    <!-- Пробег -->
                    <label for="mileageFrom">Пробег от, км:</label>
                    <input type="number" name="mileageFrom" id="mileageFrom" min="0" th:value="${param.mileageFrom}"/>
                    <label for="mileageTo">Пробег до, км:</label>
                    <input type="number" name="mileageTo" id="mileageTo" min="0" th:value="${param.mileageTo}"/>

                    <!-- Мощность -->
                    <label for="hpFrom">Мощность от, л.с.:</label>
                    <input type="number" name="hpFrom" id="hpFrom" min="0" th:value="${param.hpFrom}"/>
                    <label for="hpTo">Мощность до, л.с.:</label>
                    <input type="number" name="hpTo" id="hpTo" min="0" th:value="${param.hpTo}"/>

                    <!-- Тип кузова -->
                    <label for="bodyType">Кузов:</label>
                    <select name="bodyType" id="bodyType">
                        <option value="">Любой</option>
                        <option th:each="bt : ${bodyTypes}"
                                th:value="${bt}"
                                th:text="${bt}"
                                th:selected="${param.bodyType != null and param.bodyType[0] == bt}"></option>
                    </select>

                    <!-- Цвет -->
                    <label for="color">Цвет:</label>
                    <select name="color" id="color">
                        <option value="">Любой</option>
                        <option th:each="cl : ${colors}"
                                th:value="${cl}"
                                th:text="${cl}"
                                th:selected="${param.color != null and param.color[0] == cl}"></option>
                    </select>

                    <!-- Кондиционер -->
                    <label for="airConditioning">Кондиционер:</label>
                    <select name="airConditioning" id="airConditioning">
                        <option value="">Не важно</option>
                        <option value="true" th:selected="${param.airConditioning != null and param.airConditioning[0] == 'true'}">Да</option>
                        <option value="false" th:selected="${param.airConditioning != null and param.airConditioning[0] == 'false'}">Нет</option>
                    </select>
                    <div class="button-group">
                        <button type="submit" class="apply-btn">Применить</button>
                        <button type="button" class="reset-btn" onclick="window.location.href='/catalog'">Сбросить</button>
                    </div>
                </form>
            </div>
        </div>
        <ul class="nav-menu">
            <li sec:authorize="isAuthenticated()"><a href="/profile" class="nav-link">Профиль</a></li>
            <li sec:authorize="isAuthenticated()"><a href="/profile/orders" class="nav-link">Мои заказы</a></li>
            <li sec:authorize="isAuthenticated()"><a href="/favorites" class="nav-link">Избранное</a></li>
            <li sec:authorize="hasAuthority('ROLE_ADMIN')"><a href="/admin/dashboard" class="nav-link">Админка</a></li>
            <li sec:authorize="!isAuthenticated()"><a href="/auth/login" class="nav-link">Вход</a></li>
            <li sec:authorize="!isAuthenticated()"><a href="/register" class="nav-link">Регистрация</a></li>
            <li sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
                    <button type="submit" class="nav-link" style="background:none; border:none; cursor:pointer;">Выйти</button>
                </form>
            </li>
        </ul>
    </nav>
</header>

<main>
    <div class="product-grid">
        <div th:each="car : ${cars}" class="product-card">
            <a th:href="@{/cars/{id}(id=${car.id})}">
                <img th:src="@{${car.image != null ? car.image : '/images/no-image.jpg'}}" class="product-img" th:alt="${car.brandName + ' ' + car.modelName}"/>
                <h3 th:text="${car.brandName + ' ' + car.modelName}">Марка Модель</h3>
                <p class="price" th:text="${#numbers.formatDecimal(car.price, 0, 0) + ' ₽'}">цена</p>
                <p th:if="${car.stockQuantity > 0}" style="color:green;">В наличии</p>
                <p th:unless="${car.stockQuantity > 0}" style="color:red;">Нет в наличии</p>
            </a>

            <!-- Кнопка избранного (сердечко) -->
            <form th:action="@{/favorites/toggle}" method="post" class="favorite-form">
                <input type="hidden" name="carId" th:value="${car.id}"/>
                <!-- CSRF (если включён) -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
                <!-- корректный доступ к Map в Thymeleaf: favoriteStatus[car.id] -->
                <button type="submit"
                        class="favorite-btn"
                        th:classappend="${favoriteStatus != null and favoriteStatus[car.id]} ? ' active' : ''"
                        th:attr="aria-label=${favoriteStatus != null and favoriteStatus[car.id]} ? 'Убрать из избранного' : 'Добавить в избранное'"
                        th:attrappend="title=${favoriteStatus != null and favoriteStatus[car.id]} ? 'Убрать из избранного' : 'Добавить в избранное'">
                    <i class="fa-solid fa-heart" aria-hidden="true"></i>
                </button>
            </form>

            <!-- Кнопка подробнее -->
            <a th:href="@{/cars/{id}(id=${car.id})}" class="details-btn">Подробнее</a>
        </div>

        <div th:if="${cars.isEmpty()}" class="no-products">
            <p>Автомобили не найдены</p>
        </div>
    </div>

    <!-- Пагинация -->
    <div class="pagination" th:if="${totalPages > 1}">
            <a th:each="i : ${#numbers.sequence(1, totalPages)}"
           th:href="@{/catalog(page=${i-1}, search=${searchQuery}, brandId=${param.brandId}, modelId=${param.modelId}, country=${param.country}, steeringSide=${param.steeringSide}, engineType=${param.engineType}, minPrice=${param.minPrice}, maxPrice=${param.maxPrice}, yearFrom=${param.yearFrom}, yearTo=${param.yearTo}, mileageFrom=${param.mileageFrom}, mileageTo=${param.mileageTo}, hpFrom=${param.hpFrom}, hpTo=${param.hpTo}, bodyType=${param.bodyType}, color=${param.color}, airConditioning=${param.airConditioning})}"
           th:class="${currentPage == i-1} ? 'active' : ''"
           th:text="${i}"></a>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Фильтры: показать/скрыть панель
        document.querySelector('.filter-button')?.addEventListener('click', (e) => {
            e.stopPropagation();
            const form = document.querySelector('.filter-form');
            if (!form) return;

            // Для десктопа (широкие экраны) позиционируем панель прямо под кнопкой
            if (window.innerWidth >= 900) {
                const btnRect = e.currentTarget.getBoundingClientRect();
                form.style.left = `${btnRect.left}px`;
                form.style.top = `${btnRect.bottom + window.scrollY + 8}px`; // чуть ниже кнопки
                form.style.right = 'auto';
            } else {
                // На мобильных и планшетах используем блочное расположение (CSS через media)
                form.style.left = '';
                form.style.top = '';
                form.style.right = '';
            }

            form.classList.toggle('active');
        });

        document.addEventListener('click', (e) => {
            const filterContainer = document.querySelector('.filter-container');
            if (!filterContainer.contains(e.target)) {
                document.querySelector('.filter-form').classList.remove('active');
            }
        });

        // Проверка цены перед отправкой
        document.getElementById('filter-form')?.addEventListener('submit', (e) => {
            const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
            const maxPrice = parseFloat(document.getElementById('maxPrice').value) || Infinity;
            if (minPrice > maxPrice) {
                e.preventDefault();
                alert('Минимальная цена не может быть больше максимальной');
            }
        });
    });
</script>
</body>
</html>
